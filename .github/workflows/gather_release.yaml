name: 'Gather_release'

on:
  workflow_dispatch:
  schedule:
    - cron: '*/30 0-10 * * *'

env:
  zip: CNP_Feed_Release-main_

permissions: write-all

jobs:
  Gather:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v2
        with:
          ref: ${{ github.head_ref }}

      - name: Set up Python
        uses: actions/setup-python@v2
        with:
          python-version: 3.9

      - name: Install dependencies
        run: |
          sudo apt-get install sshpass -y
          pip install pipreqs
          pipreqs .
          pip install -r requirements.txt
          rm requirements.txt

      - name: Do the gather
        run: |
          git clone https://github.com/CECNdata/CNP_Feed_Test.git tmp
          for file in `ls -d tmp/*Customs*`;do (base_dir=${file} python3 gather.py);done
          rm -rf tmp

      - name: FTP upload
        run: |
          export filename=${{ env.zip }}$(TZ=UTC-8 date +%Y%m%d).zip
          zip -r ${filename} *.csv 
          echo "put ${filename} ${{ secrets.FTP_PATH }}" |  SSHPASS='${{ secrets.FTP_PASS }}' sshpass -e sftp -P ${{ secrets.FTP_PORT }} -o "StrictHostKeyChecking=no" ${{ secrets.FTP }}  2> >(grep -v "ftp" 1>&2)
          rm -rf ${filename}

      - name: Commit report
        continue-on-error: true
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          git checkout --orphan latest_branch
          git add -A
          git commit -am "init report"
          git branch -D main
          git branch -m main
          git remote set-url origin https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/$GITHUB_REPOSITORY
          git push -f origin main

